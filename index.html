<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrinho 2026 - Flashcards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-content">
      <div class="icons">🌱 🚜 🐄 🌾</div>
      <h1>Agrinho 2026</h1>
      <p class="subtitle">Aprenda sobre o campo se divertindo!</p>
    </div>
  </header>
  
  <main>
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text">Cartão <span id="current">1</span> de <span id="total">8</span></p>
    </div>
    
    <div class="card-container" id="cardContainer">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front" id="front">
          <div class="card-content">
            <div class="question" id="question"></div>
          </div>
        </div>
        <div class="card-face card-back" id="back">
          <div class="card-content">
            <div class="answer" id="answer"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button onclick="previousCard()" class="btn-prev">← Anterior</button>
      <button onclick="flipCard()" class="btn-flip">Virar Cartão</button>
      <button onclick="nextCard()" class="btn-next">Próximo →</button>
    </div>

    <!-- Imagens decorativas -->
    <div class="agro-images">
      <img src="https://files.grok.x.ai/grok/attachments/Bkg9b" alt="Fazenda" />
      <img src="https://files.grok.x.ai/grok/attachments/01TCu" alt="Agricultor" />
    </div>
  </main>
  
  <footer>
    <p>🌾 Programa Agrinho 2026 • SENAR • Aprendendo sobre o campo 🌱</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
